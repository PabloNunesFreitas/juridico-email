services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: juridico
    ports:
      - "5433:5432"  # 5432 ocupado por outra stack local
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/juridico
      JWT_SECRET: ${JWT_SECRET:-change-me-in-prod}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-mock}
      CENTRAL_EMAIL: ${CENTRAL_EMAIL:-poupanca@empresa.com.br}
      OUTLOOK_CLIENT_ID: ${OUTLOOK_CLIENT_ID:-}
      OUTLOOK_CLIENT_SECRET: ${OUTLOOK_CLIENT_SECRET:-}
      OUTLOOK_TENANT_ID: ${OUTLOOK_TENANT_ID:-}
      OUTLOOK_REFRESH_TOKEN: ${OUTLOOK_REFRESH_TOKEN:-}
      GMAIL_CLIENT_ID: ${GMAIL_CLIENT_ID:-}
      GMAIL_CLIENT_SECRET: ${GMAIL_CLIENT_SECRET:-}
      GMAIL_REFRESH_TOKEN: ${GMAIL_REFRESH_TOKEN:-}
      AUTO_SYNC_ENABLED: ${AUTO_SYNC_ENABLED:-true}
      AUTO_SYNC_INTERVAL_SECONDS: ${AUTO_SYNC_INTERVAL_SECONDS:-60}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@empresa.com.br}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-admin123}
      CORS_ORIGINS: http://localhost:3001
    ports:
      - "8001:8000"  # 8000 livre, mas mantemos consistência

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8001
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8001
    ports:
      - "3001:3000"  # 3000 ocupado por outra stack local

volumes:
  pgdata:
