services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER}
      CENTRAL_EMAIL: ${CENTRAL_EMAIL}
      OUTLOOK_CLIENT_ID: ${OUTLOOK_CLIENT_ID}
      OUTLOOK_CLIENT_SECRET: ${OUTLOOK_CLIENT_SECRET}
      OUTLOOK_TENANT_ID: ${OUTLOOK_TENANT_ID}
      OUTLOOK_REFRESH_TOKEN: ${OUTLOOK_REFRESH_TOKEN}
      GMAIL_CLIENT_ID: ${GMAIL_CLIENT_ID}
      GMAIL_CLIENT_SECRET: ${GMAIL_CLIENT_SECRET}
      GMAIL_REFRESH_TOKEN: ${GMAIL_REFRESH_TOKEN}
      AUTO_SYNC_ENABLED: ${AUTO_SYNC_ENABLED:-true}
      AUTO_SYNC_INTERVAL_SECONDS: ${AUTO_SYNC_INTERVAL_SECONDS:-60}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}
      CORS_ORIGINS: ${CORS_ORIGINS}
      ATTACHMENT_ROOT: /opt/juridico-email/attachments
      PROTECTED_ACCOUNT_EMAILS: poupanca@andradealves.adv.br
    volumes:
      - attachments:/opt/juridico-email/attachments
    ports:
      - "8000:8000"

volumes:
  pgdata:
  attachments:
